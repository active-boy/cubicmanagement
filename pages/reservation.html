<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>预约车位 - 立体停车场管理系统</title>
    <link rel="stylesheet" href="../style.css">
    <link rel="stylesheet" href="../css/main.css">
    <link rel="stylesheet" href="../css/reservation.css">
</head>
<body>
    <div class="container">
        <header>
            <div class="logo">
                <img src="../images/logo.png" alt="停车场Logo" onerror="this.src='https://via.placeholder.com/50x50?text=P'">
                <h1>立体停车场管理系统</h1>
            </div>
            <nav>
                <button class="nav-btn" onclick="navigateTo('../index.html')">首页</button>
                <button class="nav-btn active" onclick="navigateTo('reservation.html')">预约车位</button>
                <button class="nav-btn" onclick="navigateTo('realtime-display.html')">实时车位</button>
                <button class="nav-btn" onclick="navigateTo('alarm.html')">应急报警</button>
                <button class="nav-btn" onclick="navigateTo('pickup.html')">取车</button>
            </nav>
        </header>

        <main>
            <div class="reservation-container">
                <h2>智能车位预约</h2>
                
                <!-- 步骤指示器 -->
                <div class="steps">
                    <div class="step active" id="step1">1. 填写信息</div>
                    <div class="step" id="step2">2. 车位推荐</div>
                    <div class="step" id="step3">3. 确认预约</div>
                </div>

                <!-- 步骤1：填写基本信息 -->
                <div class="step-content" id="step1Content">
                    <div class="form-group">
                        <label>手机号：</label>
                        <input type="tel" id="phoneNumber" placeholder="请输入11位手机号码" maxlength="11">
                        <small>一个手机号只能预约一个车位</small>
                    </div>

                    <div class="form-group">
                        <label>预约日期：</label>
                        <input type="date" id="reservationDate">
                    </div>

                    <div class="form-group">
                        <label>开始时间：</label>
                        <input type="time" id="startTime">
                    </div>

                    <div class="form-group">
                        <label>结束时间：</label>
                        <input type="time" id="endTime">
                    </div>

                    <div class="form-group">
                        <label>车库号：</label>
                        <select id="garageSelect">
                            <option value="">请选择车库号</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label>层数：</label>
                        <select id="levelSelect">
                            <option value="">请选择层数</option>
                            <option value="1">一层</option>
                            <option value="2">二层</option>
                        </select>
                    </div>

                    <button class="next-btn" onclick="goToStep2()">下一步：车位推荐</button>
                </div>

                <!-- 步骤2：车位推荐 -->
                <div class="step-content" style="display:none;" id="step2Content">
                    <div class="recommendation-info">
                        <h3>智能推荐车位</h3>
                        <p>基于您的选择，我们为您推荐以下最优车位：</p>
                    </div>
                    
                    <div class="recommended-spots" id="recommendedSpots">
                        <!-- 推荐车位将动态显示在这里 -->
                    </div>

                    <div class="action-buttons">
                        <button class="prev-btn" onclick="goToStep1()">上一步</button>
                        <button class="next-btn" onclick="goToStep3()">选择此车位并继续</button>
                    </div>
                </div>

                <!-- 步骤3：确认预约 -->
                <div class="step-content" style="display:none;" id="step3Content">
                    <div class="reservation-summary" id="reservationSummary">
                        <!-- 预约信息摘要将显示在这里 -->
                    </div>
                    
                    <div class="action-buttons">
                        <button class="prev-btn" onclick="goToStep2()">上一步</button>
                        <button class="confirm-btn" onclick="confirmReservation()">确认预约并前往支付</button>
                    </div>
                </div>
            </div>
        </main>

        <footer>
            <p>&copy; 2024 立体停车场管理系统 | 服务热线: 400-123-4567</p>
        </footer>
    </div>

    <script src="../script.js"></script>
    <script src="../js/utils/parking-algorithm.js"></script>
    <script src="../js/utils/validation.js"></script>
    <script src="../js/api/parking-data.js"></script>
    <script src="../js/api/reservation-api.js"></script>
    <script src="../js/pages/reservation.js"></script>
</body>
</html>
